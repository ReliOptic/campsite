<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire Icons — Visual Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #ccc;
    font-family: 'SF Mono', 'Fira Code', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
    gap: 48px;
  }
  h1 { color: #ffaa00; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; }
  h2 { color: #888; font-size: 13px; margin-bottom: 12px; }
  .row {
    display: flex;
    gap: 40px;
    align-items: flex-end;
  }
  .icon-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .icon-card .label {
    font-size: 11px;
    color: #666;
    text-align: center;
  }
  .icon-card .label .ko {
    color: #999;
    font-size: 13px;
    display: block;
    margin-bottom: 2px;
  }

  /* animations */
  .fire-bulssi {
    animation: fire-bulssi-flicker 2s ease-in-out infinite;
  }
  @keyframes fire-bulssi-flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .fire-modakbul {
    animation: fire-modakbul-pulse 1.5s ease-in-out infinite;
  }
  @keyframes fire-modakbul-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(0.95); }
  }
  .fire-deungbul {
    animation: fire-deungbul-glow 3s ease-in-out infinite;
  }
  @keyframes fire-deungbul-glow {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.9; }
  }
  .fire-yeongi {
    animation: fire-yeongi-drift 4s ease-in-out infinite;
  }
  @keyframes fire-yeongi-drift {
    0%, 100% { transform: translateY(0); opacity: 0.7; }
    50% { transform: translateY(-2px); opacity: 0.5; }
  }
  .fire-jangjak {
    /* static */
  }
</style>
</head>
